detect:
  adaptive_block: 31
  adaptive_c: 2
  canny_high: 150
  canny_low: 50
  l1_row_kernel: 30
  lg_kernel: 17
  max_aspect_ratio: 12.0
  md_kernel: 9
  merge_h_gap: 18
  merge_iou: 0.4
  merge_y_overlap_threshold: 0.75
  min_area_ratio: 0.0003
  min_aspect_ratio: 0.05
  min_char_size: 14
  min_element_size: 10
  row_gap_min: 12
  sm_kernel: 5
  text_max_area_pct: 0.005
  text_max_height_pct: 0.08
  text_merge_gap: 25
  text_y_alignment_tol: 10
  two_stage_min_size: 150
  white_threshold: 230
  protect_inner_white: false
# ── 行列投影分割（替代传统 CV 检测）───────────────────────────
# 两遍扫描：先按行间隙切分，再在行内按列间隙切分。
# 适合白底、行列排列整齐的密集排版图。
# grid.enabled: true → grid_cutter 分割；false → 传统 CV 检测
grid:
  enabled: true
  bg_color: auto
  bg_tolerance: 30
  min_gap_rows: 3
  min_gap_cols: 3
  min_row_height: 10
  min_crop_area: 200
  crop_border: 0


# 输入/输出目录可改为绝对路径，如 D:\workspace\input
input_dir: input
label_text_cleanup:
  dark_threshold: 120
  dilate: 1
  enabled: false
  full_page: true
  max_component_area: 260
  max_component_height: 26
  max_component_width: 36
  protect_color_radius: 8
  protect_saturation_min: 90
  region_left_width: 170
  region_top_height: 45
  saturation_max: 80
output_dir: output
watch_interval: 10  # 监控模式扫描间隔(秒)
ai_max_dim: 6000  # AI\u6e32\u67d3\u6700\u5927\u8fb9\u957f(px)\uff0c\u8c03\u5927\u53ef\u63d0\u9ad8\u6e05\u6670\u5ea6

# ── 白底图抠图 ───────────────────────────────────────────────
# 针对纯白背景的密集排版图优化。
# white_bg_alpha: 用连通域分析替代深度学习模型，100% 保留元素内白色。
#   enabled: true  → 使用边缘连通性抠图（快速、精确、零模型下载）
#   enabled: false → 使用 BRIA RMBG-1.4（通用，适合非纯白背景）
# white_threshold: 判定为白色的灰度阈值（0-255），默认 230。
rgba_crop:
  enabled: true
  white_bg_alpha: false
  white_threshold: 230
  protect_inner_white: false

photoshop:
  add_box_layers: false
  add_original_layer: false
  box_color:
  - 255
  - 0
  - 0
  box_thickness: 2
  enabled: true
  psd_name_suffix: _auto
  visible: true
preview:
  box_thickness: 2
  draw_box: true
  draw_groups: true
  draw_index: true
  draw_rows: true
rmbg_scoring:
  enabled: false
  align_weight: 0.15
  area_weight: 0.15
  edge_weight: 0.3
  rmbg_weight: 0.25
  score_threshold: 0.35
  shape_weight: 0.15
